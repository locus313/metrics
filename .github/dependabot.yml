version: 2
updates:
  - package-ecosystem: npm
    labels:
      - 📦 dependencies
    directory: /
    schedule:
      interval: weekly
    reviewers:
      - lishaduck
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: vue-prism-component
        versions:
          - 2.0.0
  - package-ecosystem: github-actions
    labels:
      - 📦 dependencies
    directory: /
    schedule:
      interval: weekly
    reviewers:
      - lishaduck
    commit-message:
      prefix: "ci(deps)"
